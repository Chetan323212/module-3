<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-contianer{
            border: 2px solid black;
            display: flex;
            margin-left: 20px;
            flex-wrap: wrap;
            gap: 20px;
            height: 500px;
            width: 500px;
            align-items: center;
            
            /*justify-content: space-between;
            justify-content: space-around;
            justify-content: space-evenly;*/

        }
        .box{
            background-color: blueviolet;
            color: white;
            padding: 100px;
            border-radius: 8px;
            height:fit-content;
            width: fit-content;
        }
        .special{
            align-self: center;
        }
    </style>
</head>
<body>
    
    <div class="box-contianer">
        <div class="box">box 1</div>
        <div class="box special">box 2</div>
        <div class="box">box 3</div>
    </div>
</body>
</html>
